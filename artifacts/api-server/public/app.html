    <link rel="stylesheet" crossorigin href="/assets/index-C1GP4BNZ.css">
    <!-- Custom overrides — loaded AFTER compiled CSS to win cascade -->
    <style>
      /* 1. Hide only the top-right TON pill (it uniquely has class "glass") */
      div.glass:has(img[alt="TON"]) {
        display: none !important;
      }

      /* 2. Premium logo text style */
      #tg-logo-text {
        font-family: 'Playfair Display', serif !important;
        font-weight: 700 !important;
        letter-spacing: 0.04em !important;
        background: linear-gradient(135deg, #ffffff 0%, #e8d5a3 50%, #c9a84c 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
      }

      /* 3. New logo image replacing the mascot component */
      #tg-new-logo {
        height: 28px;
        width: auto;
        max-width: 140px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.4));
      }

      /* 4. Online counter */
      .tg-online-counter {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        font-weight: 600;
        color: #4ade80;
        margin-left: 6px;
        white-space: nowrap;
      }
      .tg-online-counter::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        min-width: 6px;
        border-radius: 50%;
        background: #4ade80;
        box-shadow: 0 0 6px #4ade80;
        animation: tg-pulse 2s infinite;
      }
      @keyframes tg-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.4); }
      }
    </style>
    <script>
      (function () {
        var _cachedCount = 1247;
        function fmtOnline(n) {
          return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(n);
        }
        function fetchOnline(cb) {
          fetch('/api/stats/online')
            .then(function(r) { return r.json(); })
            .then(function(d) { if (d && typeof d.count === 'number') { _cachedCount = d.count; } cb(_cachedCount); })
            .catch(function() { cb(_cachedCount); });
        }

        let plusDone = false;
        let logoDone = false;
        let logoBadgeDone = false;

        function patchLogoImage() {
          if (logoBadgeDone) return;
          const candidates = document.querySelectorAll('div.absolute.select-none');
          for (const el of candidates) {
            const cls = el.className || '';
            if (!cls.includes('left-1/2') && !cls.includes('translate-x')) continue;
            if (el.querySelector('#tg-new-logo')) { logoBadgeDone = true; return; }
            const img = document.createElement('img');
            img.id = 'tg-new-logo';
            img.src = '/assets/topgift-splash-logo-nobg.png';
            img.alt = 'TopGift';
            logoDone = true;
            el.innerHTML = '';
            el.appendChild(img);
            el.style.filter = 'none';
            logoBadgeDone = true;
            break;
          }
        }

        function patchLogoText() {
          if (logoDone) return;
          const all = document.querySelectorAll('*');
          for (const el of all) {
            if (
              el.childNodes.length === 1 &&
              el.childNodes[0].nodeType === 3 &&
              el.textContent.trim() === 'TopGift' &&
              !el.id
            ) {
              el.id = 'tg-logo-text';
              logoDone = true;
              break;
            }
          }
        }

        function findPlusBtn() {
          const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          let t;
          while ((t = walker.nextNode())) {
            if (t.textContent.trim() !== '+') continue;
            let node = t.parentElement;
            for (let i = 0; i < 6; i++) {
              if (!node) break;
              const w = node.offsetWidth, h = node.offsetHeight;
              if (w > 10 && w < 50 && h > 10 && h < 50 && Math.abs(w - h) < 12) return node;
              node = node.parentElement;
            }
          }
          return null;
        }

        function patchPlus() {
          if (plusDone) return;
          if (document.querySelector('.tg-online-counter')) { plusDone = true; return; }
          const btn = findPlusBtn();
          if (!btn || btn.dataset.tgPlusPatched) return;
          btn.dataset.tgPlusPatched = '1';
          btn.style.cssText += ';background:rgba(255,255,255,0.12)!important;border:1.5px solid rgba(255,255,255,0.28)!important;color:#fff!important;width:24px!important;height:24px!important;min-width:24px!important;min-height:24px!important;border-radius:50%!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;font-size:14px!important;box-shadow:none!important;padding:0!important;';
          const counter = document.createElement('span');
          counter.className = 'tg-online-counter';
          fetchOnline(function(n) {
            counter.textContent = fmtOnline(n);
            setInterval(function() {
              fetchOnline(function(n2) { counter.textContent = fmtOnline(n2); });
            }, 10000);
          });
          if (btn.parentNode) btn.parentNode.insertBefore(counter, btn.nextSibling);
          plusDone = true;
        }

        function runAll() {
          patchLogoText();
          patchLogoImage();
          patchPlus();
        }

        const obs = new MutationObserver(() => {
          runAll();
          if (plusDone && logoDone && logoBadgeDone) obs.disconnect();
        });

        document.addEventListener('DOMContentLoaded', () => {
          obs.observe(document.body, { childList: true, subtree: true });
          setTimeout(runAll, 400);
          setTimeout(runAll, 1200);
          setTimeout(runAll, 2500);
        });
      })();
    </script>
    <style>
      #tg-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #07070f;
        display: flex;
        align-items: center;

      @keyframes tg-splash-in {
        from { opacity: 0; transform: scale(0.88); }
        to   { opacity: 1; transform: scale(1); }
      }
    </style>

  <body>
    <div id="tg-splash">
      <img src="/assets/topgift-splash-logo-nobg.png" alt="TopGift" />
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById('tg-splash');
        // Start fade-out after 1.4s, then remove from DOM
        setTimeout(function () {
          splash.classList.add('tg-splash-hide');
          setTimeout(function () {
            splash.remove();
          }, 600);
        }, 1400);
      })();
    </script>

    <style>
      #tgap-box{position:fixed;left:0;right:0;top:var(--tgap-top,175px);bottom:56px;z-index:9400;background:#0a0a12;border-radius:14px 14px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 12px;display:flex;flex-direction:column;gap:8px;transform:translateY(100%);opacity:0;transition:transform .35s cubic-bezier(.32,.72,0,1),opacity .25s ease;pointer-events:none}

      .tgap-card:active{background:#1a1c2e}
      .tgap-info{display:flex;flex-direction:column;gap:5px;flex:1}
      .tgap-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.2);border-radius:20px;padding:3px 10px 3px 7px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:#4ade80;width:fit-content}

      .tgap-icons{display:flex;align-items:center;gap:5px;margin-top:2px}
      .tgap-ico{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:12px;font-weight:700}
      .tgap-ico-ton{background:rgba(83,131,254,.25);color:#5383fe}
      .tgap-ico-star{background:rgba(255,193,7,.22);color:#ffc107}

      .tgap-chat{background:rgba(255,255,255,.1);border-radius:6px;padding:3px 8px;font-family:'Inter',sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.04em}
      .tgap-mascot{width:120px;height:100px;object-fit:contain;object-position:center right;flex-shrink:0;filter:drop-shadow(0 5px 12px rgba(0,0,0,.55))}
    </style>
    <script>
      (function(){
        var box=document.getElementById('tgap-box');
        function calcTop(){
          var sel=['[class*="banner" i]','[class*="slider" i]','[class*="carousel" i]','[class*="swiper" i]'];
          for(var s=0;s<sel.length;s++){var el=document.querySelector(sel[s]);if(el){var b=Math.round(el.getBoundingClientRect().bottom);if(b>60&&b<window.innerHeight*.7){box.style.setProperty('--tgap-top',(b-8)+'px');return;}}}
          box.style.setProperty('--tgap-top',Math.round(window.innerHeight*.28)+'px');
        }
        function show(){calcTop();box.classList.add('tgap-show');}
        box.addEventListener('click',function(e){var c=e.target.closest('.tgap-card');if(!c)return;console.log('[TopGift] Игра:',c.dataset.game);});
        setInterval(function(){document.querySelectorAll('.tgap-cnt').forEach(function(el){var v=parseInt(el.textContent)||parseInt(el.dataset.base)||10;el.textContent=Math.max(1,v+Math.floor(Math.random()*7)-3);});},4000);
        var _shown=false;
        function tryShow(){if(_shown)return;var root=document.getElementById('root');if(root&&root.children.length>0){_shown=true;setTimeout(show,600);}}
        var obs=new MutationObserver(function(){tryShow();if(_shown)obs.disconnect();});
        document.addEventListener('DOMContentLoaded',function(){var root=document.getElementById('root');if(root)obs.observe(root,{childList:true,subtree:true});setTimeout(tryShow,1000);setTimeout(function(){if(!_shown){_shown=true;show();}},2500);});
      })();
    </script>
