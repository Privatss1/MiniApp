    <!-- Custom overrides — loaded AFTER compiled CSS to win cascade -->
    <style>
      /* 1. Hide only the top-right TON pill (it uniquely has class "glass") */
      div.glass:has(img[alt="TON"]) {
        display: none !important;
      }

      /* 2. Premium logo text style */
      #tg-logo-text {
        font-family: 'Playfair Display', serif !important;
        font-weight: 700 !important;
        letter-spacing: 0.04em !important;
        background: linear-gradient(135deg, #ffffff 0%, #e8d5a3 50%, #c9a84c 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
      }

      /* 3. New logo image replacing the mascot component */
      #tg-new-logo {
        height: 28px;
        width: auto;
        max-width: 140px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.4));
      }

      /* 4. Online counter */
      .tg-online-counter {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        font-weight: 600;
        color: #4ade80;
        margin-left: 6px;
        white-space: nowrap;
      }
      .tg-online-counter::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        min-width: 6px;
        border-radius: 50%;
        background: #4ade80;
        box-shadow: 0 0 6px #4ade80;
        animation: tg-pulse 2s infinite;
      }
      @keyframes tg-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.4); }
      }
    </style>
    <script>
      (function () {
        var _cachedCount = 1247;
        function fmtOnline(n) {
          return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(n);
        }
        function fetchOnline(cb) {
          fetch('/api/stats/online')
            .then(function(r) { return r.json(); })
            .then(function(d) { if (d && typeof d.count === 'number') { _cachedCount = d.count; } cb(_cachedCount); })
            .catch(function() { cb(_cachedCount); });
        }

        let plusDone = false;
        let logoDone = false;
        let logoBadgeDone = false;

        function patchLogoImage() {
          if (logoBadgeDone) return;
          const candidates = document.querySelectorAll('div.absolute.select-none');
          for (const el of candidates) {
            const cls = el.className || '';
            if (!cls.includes('left-1/2') && !cls.includes('translate-x')) continue;
            if (el.querySelector('#tg-new-logo')) { logoBadgeDone = true; return; }
            const img = document.createElement('img');
            img.id = 'tg-new-logo';
            img.src = '/assets/topgift-splash-logo-nobg.png';
            img.alt = 'TopGift';
            logoDone = true;
            el.innerHTML = '';
            el.appendChild(img);
            el.style.filter = 'none';
            logoBadgeDone = true;
            break;
          }
        }

        function patchLogoText() {
          if (logoDone) return;
          const all = document.querySelectorAll('*');
          for (const el of all) {
            if (
              el.childNodes.length === 1 &&
              el.childNodes[0].nodeType === 3 &&
              el.textContent.trim() === 'TopGift' &&
              !el.id
            ) {
              el.id = 'tg-logo-text';
              logoDone = true;
              break;
            }
          }
        }

        function findPlusBtn() {
          const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          let t;
          while ((t = walker.nextNode())) {
            if (t.textContent.trim() !== '+') continue;
            let node = t.parentElement;
            for (let i = 0; i < 6; i++) {
              if (!node) break;
              const w = node.offsetWidth, h = node.offsetHeight;
              if (w > 10 && w < 50 && h > 10 && h < 50 && Math.abs(w - h) < 12) return node;
              node = node.parentElement;
            }
          }
          return null;
        }

        function patchPlus() {
          if (plusDone) return;
          if (document.querySelector('.tg-online-counter')) { plusDone = true; return; }
          const btn = findPlusBtn();
          if (!btn || btn.dataset.tgPlusPatched) return;
          btn.dataset.tgPlusPatched = '1';
          btn.style.cssText += ';background:rgba(255,255,255,0.12)!important;border:1.5px solid rgba(255,255,255,0.28)!important;color:#fff!important;width:24px!important;height:24px!important;min-width:24px!important;min-height:24px!important;border-radius:50%!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;font-size:14px!important;box-shadow:none!important;padding:0!important;';
          const counter = document.createElement('span');
          counter.className = 'tg-online-counter';
          fetchOnline(function(n) {
            counter.textContent = fmtOnline(n);
            setInterval(function() {
              fetchOnline(function(n2) { counter.textContent = fmtOnline(n2); });
            }, 10000);
          });
          if (btn.parentNode) btn.parentNode.insertBefore(counter, btn.nextSibling);
          plusDone = true;
        }

        function runAll() {
          patchLogoText();
          patchLogoImage();
          patchPlus();
        }

        const obs = new MutationObserver(() => {
          runAll();
          if (plusDone && logoDone && logoBadgeDone) obs.disconnect();
        });

        document.addEventListener('DOMContentLoaded', () => {
          obs.observe(document.body, { childList: true, subtree: true });
          setTimeout(runAll, 400);
          setTimeout(runAll, 1200);
          setTimeout(runAll, 2500);
        });
      })();
    </script>

    <style>

    <script>
      (function () {
        var overlay = document.getElementById('tg-games-overlay');

        // Анимируем счётчики игроков — небольшое случайное дрейфование
        function driftCounters() {
          document.querySelectorAll('.tgo-live').forEach(function(el) {
            var v = parseInt(el.textContent) || 0;
            var delta = Math.floor(Math.random() * 7) - 3;
            var min = {'cases':5,'crash':50,'mini':10}[el.dataset.key] || 5;
            var max = {'cases':60,'crash':300,'mini':120}[el.dataset.key] || 200;
            el.textContent = Math.min(max, Math.max(min, v + delta));
          });
        }
        setInterval(driftCounters, 4000);

        // Показываем оверлей (вызывается после скрытия splash)
        function showOverlay() {
          overlay.classList.add('tgo-visible');
        }

        // Попытка кликнуть на нужную игру внутри React-приложения
        function tryNavigateToGame(gameName) {
          // Сначала убеждаемся что активна вкладка Игры
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var t;
          while ((t = walker.nextNode())) {
            var txt = t.textContent.trim();
            if (txt === 'Игры' || txt === 'Games') {
              var node = t.parentElement;
              for (var i = 0; i < 6; i++) {
                if (!node || node === document.body) break;
                var tag = node.tagName;
                var role = node.getAttribute ? node.getAttribute('role') : null;
                if (tag === 'BUTTON' || tag === 'A' || role === 'button' || role === 'tab') {
                  node.click();
                  break;
                }
                node = node.parentElement;
              }
              break;
            }
          }

          // Потом ищем карточку с нужным именем
          setTimeout(function() {
            var walker2 = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
            var t2;
            while ((t2 = walker2.nextNode())) {
              if (t2.textContent.trim() === gameName) {
                var node2 = t2.parentElement;
                for (var j = 0; j < 8; j++) {
                  if (!node2 || node2 === document.body) break;
                  if (node2.offsetHeight > 40 && node2.offsetHeight < 250 &&
                      node2.offsetWidth > 100) {
                    node2.click();
                    break;
                  }
                  node2 = node2.parentElement;
                }
                break;
              }
            }
          }, 350);
        }

        // Скрываем оверлей и переходим в игру
        overlay.addEventListener('click', function(e) {
          var card = e.target.closest('.tgo-card');
          if (!card) return;
          var gameName = card.dataset.game;
          overlay.classList.remove('tgo-visible');
          setTimeout(function() {
            overlay.style.display = 'none';
            tryNavigateToGame(gameName);
          }, 400);
        });

        // Определяем момент показа — ждём пока React смонтируется
        var _tgoShown = false;
        function maybeShow() {
          if (_tgoShown) return;
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            _tgoShown = true;
            showOverlay();
          }
        }

        var _tgoObs = new MutationObserver(function() { maybeShow(); });
        document.addEventListener('DOMContentLoaded', function() {
          _tgoObs.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
          // Запасные таймауты
          setTimeout(maybeShow, 800);
          setTimeout(maybeShow, 1500);
          setTimeout(function() {
            if (!_tgoShown) { _tgoShown = true; showOverlay(); }
          }, 2500);
        });
      })();
    </script>
