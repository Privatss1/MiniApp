<!DOCTYPE html>
  <html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TopGift — Игры</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        background: #0d0d18;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }

      /* Чёрная панель: 90% ширины, 70% высоты, поверх всего */
      #game-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90vw;
        height: 70vh;
        background: #07070f;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
        animation: panelIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      @keyframes panelIn {
        from { opacity: 0; transform: translate(-50%, -46%); }
        to   { opacity: 1; transform: translate(-50%, -50%); }
      }

      /* Шапка панели */
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        flex-shrink: 0;
      }
      .panel-title {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.01em;
      }
      .panel-close {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.07);
        color: rgba(255,255,255,0.7);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        line-height: 1;
      }
      .panel-close:hover { background: rgba(255,255,255,0.14); }

      /* Список игр */
      .games-list {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        -webkit-overflow-scrolling: touch;
      }
      .games-list::-webkit-scrollbar { width: 4px; }
      .games-list::-webkit-scrollbar-track { background: transparent; }
      .games-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

      /* Карточка игры */
      .game-card {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(135deg, #12171f 0%, #1c2332 100%);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 14px;
        padding: 14px 16px 14px 18px;
        min-height: 82px;
        cursor: pointer;
        overflow: hidden;
        transition: transform 0.14s ease, background 0.14s ease;
        -webkit-tap-highlight-color: transparent;
        text-decoration: none;
      }
      .game-card:active { transform: scale(0.97); }
      .game-card:hover  { background: linear-gradient(135deg, #181f2d 0%, #222d42 100%); }

      /* Цветная полоска слева */
      .game-card::before {
        content: '';
        position: absolute;
        left: 0; top: 16px; bottom: 16px;
        width: 3px;
        border-radius: 0 2px 2px 0;
        background: var(--accent, #4f8ef7);
      }

      .game-card-info {
        display: flex;
        flex-direction: column;
        gap: 5px;
        flex: 1;
      }
      .game-badge {
        font-size: 11px;
        font-weight: 600;
        color: rgba(255,255,255,0.45);
      }
      .game-badge .dot {
        display: inline-block;
        width: 6px; height: 6px;
        background: #4ade80;
        border-radius: 50%;
        margin-right: 4px;
        box-shadow: 0 0 5px #4ade80;
        vertical-align: middle;
      }
      .game-name {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        line-height: 1.1;
      }
      .game-stars {
        display: flex;
        gap: 3px;
        font-size: 12px;
        margin-top: 2px;
      }
      .game-mascot {
        width: 72px;
        height: 72px;
        object-fit: contain;
        flex-shrink: 0;
        margin-left: 10px;
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
      }
      .game-mascot-placeholder {
        width: 72px;
        height: 72px;
        flex-shrink: 0;
        margin-left: 10px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        background: rgba(255,255,255,0.05);
      }

      /* Тост уведомление */
      #game-toast {
        position: fixed;
        bottom: calc(50vh - 35vh - 50px);
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(30,40,60,0.97);
        border: 1px solid rgba(255,255,255,0.12);
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 22px;
        border-radius: 30px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s, transform 0.25s;
        z-index: 10000;
        white-space: nowrap;
      }
      #game-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>

    <div id="game-panel">
      <div class="panel-header">
        <span class="panel-title">🎮 Игры</span>
        <button class="panel-close" onclick="window.close()" title="Закрыть">✕</button>
      </div>

      <div class="games-list">

        <div class="game-card" style="--accent:#4f8ef7" data-game="Кейсы" onclick="selectGame(this)">
          <div class="game-card-info">
            <span class="game-badge"><span class="dot"></span><span class="cnt" data-base="17">17</span> играет</span>
            <span class="game-name">Кейсы</span>
            <div class="game-stars">⭐⭐</div>
          </div>
          <img class="game-mascot" src="/assets/cases-mascot-OxOGWDnB.png" alt="Кейсы"
               onerror="this.outerHTML='<div class=\'game-mascot-placeholder\'>🎁</div>'" />
        </div>

        <div class="game-card" style="--accent:#ef4f6a" data-game="Краш" onclick="selectGame(this)">
          <div class="game-card-info">
            <span class="game-badge"><span class="dot"></span><span class="cnt" data-base="134">134</span> играет</span>
            <span class="game-name">Краш</span>
            <div class="game-stars">⭐⭐⭐</div>
          </div>
          <img class="game-mascot" src="/assets/crash-mascot-CRHQgfLy.png" alt="Краш"
               onerror="this.outerHTML='<div class=\'game-mascot-placeholder\'>💥</div>'" />
        </div>

        <div class="game-card" style="--accent:#a04fef" data-game="Мини-игры" onclick="selectGame(this)">
          <div class="game-card-info">
            <span class="game-badge"><span class="dot"></span><span class="cnt" data-base="43">43</span> играет</span>
            <span class="game-name">Мини-игры</span>
            <div class="game-stars">⭐ <span style="color:rgba(255,255,255,.4);font-size:11px">💬 в чате</span></div>
          </div>
          <img class="game-mascot" src="/assets/minigames-mascot-HVbEXSoU.png" alt="Мини-игры"
               onerror="this.outerHTML='<div class=\'game-mascot-placeholder\'>🕹️</div>'" />
        </div>

        <div class="game-card" style="--accent:#f7a34f" data-game="Рулетка" onclick="selectGame(this)">
          <div class="game-card-info">
            <span class="game-badge"><span class="dot"></span><span class="cnt" data-base="28">28</span> играет</span>
            <span class="game-name">Рулетка</span>
            <div class="game-stars">⭐⭐</div>
          </div>
          <div class="game-mascot-placeholder">🎰</div>
        </div>

        <div class="game-card" style="--accent:#4fef8e" data-game="Турниры" onclick="selectGame(this)">
          <div class="game-card-info">
            <span class="game-badge"><span class="dot"></span><span class="cnt" data-base="9">9</span> играет</span>
            <span class="game-name">Турниры</span>
            <div class="game-stars">⭐⭐⭐⭐</div>
          </div>
          <div class="game-mascot-placeholder">🏆</div>
        </div>

      </div>
    </div>

    <div id="game-toast"></div>

    <script>
      // Выбор игры
      function selectGame(card) {
        var name = card.dataset.game;
        console.log('[TopGift] Игра выбрана:', name);
        showToast('Загружаем «' + name + '»…');
        // TODO: заменить на реальный переход
        // window.location.href = '/game/' + encodeURIComponent(name.toLowerCase());
      }

      // Тост
      function showToast(msg) {
        var t = document.getElementById('game-toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2200);
      }

      // Дрейф счётчиков онлайна
      setInterval(function() {
        document.querySelectorAll('.cnt').forEach(function(el) {
          var base = parseInt(el.dataset.base) || 10;
          var cur  = parseInt(el.textContent) || base;
          var delta = Math.floor(Math.random() * 7) - 3;
          el.textContent = Math.max(1, cur + delta);
        });
      }, 4000);
    </script>
  </body>
  </html>
