<!DOCTYPE html>
  <html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TopGift</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        background: #07070f;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }

      /* ---- Попап ---- */
      #popup {
        position: fixed;
        /* Центрируем по горизонтали, по вертикали — ближе к середине */
        left: 50%;
        top: 50%;
        transform: translate(-50%, -46%) scale(0.94);
        width: min(92vw, 420px);
        background: #0d0d1a;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.32s ease, transform 0.32s cubic-bezier(0.34, 1.4, 0.64, 1);
        z-index: 100;
      }
      #popup.show {
        opacity: 1;
        pointer-events: all;
        transform: translate(-50%, -50%) scale(1);
      }

      /* Шапка попапа */
      .popup-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 18px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .popup-title {
        font-size: 17px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.01em;
      }

      /* Список карточек */
      .popup-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      /* Карточка игры — точно по скриншоту */
      .game-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0 16px 18px;
        background: transparent;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
        overflow: hidden;
        position: relative;
        min-height: 105px;
        transition: background 0.12s;
        -webkit-tap-highlight-color: transparent;
      }
      .game-card:last-child { border-bottom: none; }
      .game-card:active { background: rgba(255,255,255,0.04); }

      .game-info {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 0;
      }

      /* Зелёный бейдж "N играют" */
      .game-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(74,222,128,0.13);
        border: 1px solid rgba(74,222,128,0.22);
        border-radius: 30px;
        padding: 3px 9px 3px 6px;
        width: fit-content;
        font-size: 11px;
        font-weight: 600;
        color: #4ade80;
      }
      .badge-dot {
        width: 6px; height: 6px;
        background: #4ade80;
        border-radius: 50%;
        box-shadow: 0 0 5px #4ade80;
        flex-shrink: 0;
      }
      .badge-cnt { transition: content 0.3s; }

      /* Название игры */
      .game-name {
        font-size: 27px;
        font-weight: 800;
        color: #fff;
        line-height: 1;
        letter-spacing: -0.03em;
      }

      /* Иконки-пиллы */
      .game-icons {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 1px;
      }
      .ico {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px; height: 24px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .ico-ton  { background: rgba(83,131,254,0.22); color: #5383fe; font-size: 11px; }
      .ico-star { background: rgba(255,193,7,0.20);  color: #ffc107; }
      .ico-gift { background: rgba(255,255,255,0.09); font-size: 13px; }
      .chat-pill {
        background: rgba(255,255,255,0.09);
        border-radius: 7px;
        padding: 4px 8px;
        font-size: 10px;
        font-weight: 700;
        color: rgba(255,255,255,0.55);
        letter-spacing: 0.05em;
      }

      /* Маскот */
      .game-mascot {
        width: 115px;
        height: 105px;
        object-fit: contain;
        object-position: right center;
        flex-shrink: 0;
        filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
      }
      .game-mascot-emoji {
        width: 115px;
        height: 105px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 52px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>

    <div id="popup">
      <div class="popup-header">
        <span class="popup-title">🎮 Игры</span>
      </div>

      <div class="popup-list">

        <!-- Кейсы -->
        <div class="game-card" data-game="Кейсы">
          <div class="game-info">
            <span class="game-badge">
              <span class="badge-dot"></span>
              <span class="badge-cnt" data-base="17">17</span>&nbsp;играют
            </span>
            <span class="game-name">Кейсы</span>
            <div class="game-icons">
              <span class="ico ico-ton">▽</span>
              <span class="ico ico-star">★</span>
            </div>
          </div>
          <img class="game-mascot" src="/assets/cases-mascot-OxOGWDnB.png" alt="Кейсы"
               onerror="this.outerHTML='<div class=game-mascot-emoji>🎁</div>'" />
        </div>

        <!-- Краш -->
        <div class="game-card" data-game="Краш">
          <div class="game-info">
            <span class="game-badge">
              <span class="badge-dot"></span>
              <span class="badge-cnt" data-base="124">124</span>&nbsp;играют
            </span>
            <span class="game-name">Краш</span>
            <div class="game-icons">
              <span class="ico ico-gift">🎁</span>
              <span class="ico ico-ton">▽</span>
              <span class="ico ico-star">★</span>
            </div>
          </div>
          <img class="game-mascot" src="/assets/crash-mascot-CRHQgfLy.png" alt="Краш"
               onerror="this.outerHTML='<div class=game-mascot-emoji>💥</div>'" />
        </div>

        <!-- Мини-игры -->
        <div class="game-card" data-game="Мини-игры">
          <div class="game-info">
            <span class="game-badge">
              <span class="badge-dot"></span>
              <span class="badge-cnt" data-base="43">43</span>&nbsp;играют
            </span>
            <span class="game-name">Мини-игры</span>
            <div class="game-icons">
              <span class="ico ico-star">★</span>
              <span class="ico ico-ton">▽</span>
              <span class="chat-pill">В ЧАТЕ</span>
            </div>
          </div>
          <img class="game-mascot" src="/assets/minigames-mascot-HVbEXSoU.png" alt="Мини-игры"
               onerror="this.outerHTML='<div class=game-mascot-emoji>🕹️</div>'" />
        </div>

      </div>
    </div>

    <script>
      var popup = document.getElementById('popup');

      // Показ попапа
      setTimeout(function () {
        popup.classList.add('show');
      }, 300);

      // Клик по карточке
      popup.addEventListener('click', function (e) {
        var card = e.target.closest('.game-card');
        if (!card) return;
        console.log('[TopGift] Выбрана игра:', card.dataset.game);
        // TODO: здесь будет переход в игру
      });

      // Анимация счётчиков онлайна
      setInterval(function () {
        document.querySelectorAll('.badge-cnt').forEach(function (el) {
          var base = parseInt(el.dataset.base) || 10;
          var cur  = parseInt(el.textContent) || base;
          var next = Math.max(1, cur + Math.floor(Math.random() * 7) - 3);
          el.textContent = next;
        });
      }, 4000);
    </script>
  </body>
  </html>
