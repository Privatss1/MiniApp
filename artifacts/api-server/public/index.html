    <!-- Логотип и онлайн-счётчик -->
    <script>
      (function () {
        var _cachedCount = 1247;
        var _onlineInterval = null;

        function fmtOnline(n) {
          return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(n);
        }

        function fetchOnline(cb) {
          fetch('/api/stats/online')
            .then(function (r) { return r.json(); })
            .then(function (d) {
              if (d && typeof d.count === 'number') { _cachedCount = d.count; }
              cb(_cachedCount);
            })
            .catch(function () { cb(_cachedCount); });
        }

        var plusDone = false;
        var logoDone = false;
        var logoBadgeDone = false;

        function patchLogoImage() {
          if (logoBadgeDone) return;
          var candidates = document.querySelectorAll('div.absolute.select-none');
          for (var i = 0; i < candidates.length; i++) {
            var el = candidates[i];
            var cls = el.className || '';
            if (cls.indexOf('left-1/2') === -1 && cls.indexOf('translate-x') === -1) continue;
            if (el.querySelector('#tg-new-logo')) { logoBadgeDone = true; return; }
            var img = document.createElement('img');
            img.id = 'tg-new-logo';
            img.src = '/assets/topgift-splash-logo-nobg.png';
            img.alt = 'TopGift';
            logoDone = true;
            el.innerHTML = '';
            el.appendChild(img);
            el.style.filter = 'none';
            logoBadgeDone = true;
            break;
          }
        }

        function patchLogoText() {
          if (logoDone) return;
          var all = document.querySelectorAll('*');
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if (
              el.childNodes.length === 1 &&
              el.childNodes[0].nodeType === 3 &&
              el.textContent.trim() === 'TopGift' &&
              !el.id
            ) {
              el.id = 'tg-logo-text';
              logoDone = true;
              break;
            }
          }
        }

        function findPlusBtn() {
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var t;
          while ((t = walker.nextNode())) {
            if (t.textContent.trim() !== '+') continue;
            var node = t.parentElement;
            for (var i = 0; i < 6; i++) {
              if (!node) break;
              var w = node.offsetWidth, h = node.offsetHeight;
              if (w > 10 && w < 50 && h > 10 && h < 50 && Math.abs(w - h) < 12) return node;
              node = node.parentElement;
            }
          }
          return null;
        }

        function patchPlus() {
          if (plusDone) return;
          if (document.querySelector('.tg-online-counter')) { plusDone = true; return; }
          var btn = findPlusBtn();
          if (!btn || btn.dataset.tgPlusPatched) return;
          btn.dataset.tgPlusPatched = '1';
          btn.style.cssText += ';background:rgba(255,255,255,0.12)!important;border:1.5px solid rgba(255,255,255,0.28)!important;color:#fff!important;width:24px!important;height:24px!important;min-width:24px!important;min-height:24px!important;border-radius:50%!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;font-size:14px!important;box-shadow:none!important;padding:0!important;';
          var counter = document.createElement('span');
          counter.className = 'tg-online-counter';
          fetchOnline(function (n) {
            counter.textContent = fmtOnline(n);
            if (_onlineInterval) clearInterval(_onlineInterval);
            _onlineInterval = setInterval(function () {
              fetchOnline(function (n2) { counter.textContent = fmtOnline(n2); });
            }, 10000);
          });
          if (btn.parentNode) btn.parentNode.insertBefore(counter, btn.nextSibling);
          plusDone = true;
        }

        function runAll() {
          patchLogoText();
          patchLogoImage();
          patchPlus();
        }

        var obs = new MutationObserver(function () {
          runAll();
          if (plusDone && logoDone && logoBadgeDone) obs.disconnect();
        });

        document.addEventListener('DOMContentLoaded', function () {
          obs.observe(document.body, { childList: true, subtree: true });
          setTimeout(runAll, 400);
          setTimeout(runAll, 1200);
          setTimeout(runAll, 2500);
        });
      })();
    </script>

    <div id="tg-splash">

    </div>
    <div id="root"></div>

    <script>
      (function () {
        var splash = document.getElementById('tg-splash');

        function tryClickGames() {
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var t;
          while ((t = walker.nextNode())) {
            var text = t.textContent.trim();
            if (text === 'Игры' || text === 'Games') {
              var node = t.parentElement;
              for (var i = 0; i < 6; i++) {
                if (!node || node === document.body) break;
                var tag = node.tagName;
                var role = node.getAttribute ? node.getAttribute('role') : null;
                if (tag === 'BUTTON' || tag === 'A' || role === 'button' || role === 'tab') {
                  node.click();
                  return true;
                }
                if (node.offsetHeight > 30 && node.offsetHeight < 90) {
                  node.click();
                  return true;
                }
                node = node.parentElement;
              }
            }
          }
          return false;
        }

        setTimeout(function () {
          splash.classList.add('tg-splash-hide');
          setTimeout(function () {
            splash.remove();
            if (!tryClickGames()) {
              setTimeout(tryClickGames, 200);
              setTimeout(tryClickGames, 500);
              setTimeout(tryClickGames, 900);
            }
          }, 600);
        }, 1400);
      })();
    </script>

    <script>
      (function () {
        var box = document.getElementById('tgap-box');

        // Вычисляем позицию старта панели: нижний край баннерного блока
        function calcTop() {
          var selectors = [
            '[class*="banner" i]',
            '[class*="slider" i]',
            '[class*="carousel" i]',
            '[class*="swiper" i]',
          ];
          for (var s = 0; s < selectors.length; s++) {
            var el = document.querySelector(selectors[s]);
            if (el) {
              var b = Math.round(el.getBoundingClientRect().bottom);
              if (b > 60 && b < window.innerHeight * 0.7) {
                // Залезаем на 8px выше нижнего края баннера — «слегка касаемся»
                box.style.setProperty('--tgap-top', (b - 8) + 'px');
                return;
              }
            }
          }
          // Запасной: 28% от высоты экрана
          box.style.setProperty('--tgap-top', Math.round(window.innerHeight * 0.28) + 'px');
        }

        function show() {
          calcTop();
          box.classList.add('tgap-show');
        }

        // Клик по карточке
        box.addEventListener('click', function (e) {
          var card = e.target.closest('.tgap-card');
          if (!card) return;
          console.log('[TopGift] Игра:', card.dataset.game);
        });

        // Дрейф счётчиков онлайна
        setInterval(function () {
          document.querySelectorAll('.tgap-cnt').forEach(function (el) {
            var v = parseInt(el.textContent) || parseInt(el.dataset.base) || 10;
            el.textContent = Math.max(1, v + Math.floor(Math.random() * 7) - 3);
          });
        }, 4000);

        // Авто-показ после монтирования React
        var _shown = false;
        function tryShow() {
          if (_shown) return;
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            _shown = true;
            // Небольшая задержка для рендера баннеров
            setTimeout(show, 600);
          }
        }

        var obs = new MutationObserver(function () {
          tryShow();
          if (_shown) obs.disconnect();
        });

        document.addEventListener('DOMContentLoaded', function () {
          var root = document.getElementById('root');
          if (root) obs.observe(root, { childList: true, subtree: true });
          setTimeout(tryShow, 1000);
          setTimeout(function () {
            if (!_shown) { _shown = true; show(); }
          }, 2500);
        });
      })();
    </script>
