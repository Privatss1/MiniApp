    <!--
      FIX: Отключаем Framer Motion анимации через prefers-reduced-motion.
      Когда Framer Motion обнаруживает reduced-motion, он мгновенно применяет
      конечное animate-состояние (opacity:1, y:0) без transition.
      Это устраняет чёрные прямоугольники из-за застрявших initial {opacity:0}.
      Скрипт должен стоять ПЕРЕД загрузкой React-бандла.
    -->
    <script>
      (function () {
        var _orig = window.matchMedia ? window.matchMedia.bind(window) : null;
        window.matchMedia = function (query) {
          if (typeof query === 'string' && query.indexOf('prefers-reduced-motion') !== -1) {
            return {
              matches: true,
              media: query,
              onchange: null,
              addListener: function () {},
              removeListener: function () {},
              addEventListener: function () {},
              removeEventListener: function () {},
              dispatchEvent: function () { return false; }
            };
          }
          return _orig
            ? _orig(query)
            : { matches: false, media: query, onchange: null, addListener: function(){}, removeListener: function(){}, addEventListener: function(){}, removeEventListener: function(){}, dispatchEvent: function(){ return false; } };
        };
      })();
    </script>

    <script type="module" crossorigin src="/assets/index-DI6LDH42.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C1GP4BNZ.css">

    <!-- Переопределения стилей — загружаются ПОСЛЕ compiled CSS -->
    <style>
      /* 1. Скрыть TON-пилюлю в правом верхнем углу */
      div.glass:has(img[alt="TON"]) {
        display: none !important;
      }

      /* 2. Логотип — premium градиентный текст */
      #tg-logo-text {
        font-family: 'Playfair Display', serif !important;
        font-weight: 700 !important;
        letter-spacing: 0.04em !important;
        background: linear-gradient(135deg, #ffffff 0%, #e8d5a3 50%, #c9a84c 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
      }

      /* 3. Новый логотип-изображение */
      #tg-new-logo {
        height: 28px;
        width: auto;
        max-width: 140px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.4));
      }

      /* 4. Онлайн-счётчик */
      .tg-online-counter {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        font-weight: 600;
        color: #4ade80;
        margin-left: 6px;
        white-space: nowrap;
      }
      .tg-online-counter::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        min-width: 6px;
        border-radius: 50%;
        background: #4ade80;
        box-shadow: 0 0 6px #4ade80;
        animation: tg-pulse 2s infinite;
      }
      @keyframes tg-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(1.4); }
      }

      /* 5. Игровые карточки — тёмный фон, рамка, тень */
      .rounded-\[22px\].h-\[172px\] {
        background: #0d0d20 !important;
        border-color: rgba(255, 255, 255, 0.22) !important;
        box-shadow:
          0 2px 28px rgba(0, 0, 0, 0.85),
          inset 0 1px 0 rgba(255, 255, 255, 0.07),
          0 0 0 1px rgba(255, 255, 255, 0.04) !important;
      }

      /* 6. Горизонтальные отступы для списка карточек */
      .space-y-4:has(.h-\[172px\]) {
        padding-left: 12px !important;
        padding-right: 12px !important;
      }

      /* 7. Нижний навбар — сплошной чёрный (было: полупрозрачный backdrop-blur) */
      nav {
        background: rgba(5, 5, 12, 0.99) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border-top-color: rgba(255, 255, 255, 0.06) !important;
        border-left-color: rgba(255, 255, 255, 0.06) !important;
        border-right-color: rgba(255, 255, 255, 0.06) !important;
      }
    </style>

    <!-- DOM-патчи: логотип и онлайн-счётчик (подключается к реальному API) -->
    <script>
      (function () {
        var _cachedCount = 1247;

        function fmtOnline(n) {
          return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(n);
        }

        function fetchOnline(cb) {
          fetch('/api/stats/online')
            .then(function (r) { return r.json(); })
            .then(function (d) {
              if (d && typeof d.count === 'number') { _cachedCount = d.count; }
              cb(_cachedCount);
            })
            .catch(function () { cb(_cachedCount); });
        }

        var plusDone = false;
        var logoDone = false;
        var logoBadgeDone = false;

        function patchLogoImage() {
          if (logoBadgeDone) return;
          var candidates = document.querySelectorAll('div.absolute.select-none');
          for (var i = 0; i < candidates.length; i++) {
            var el = candidates[i];
            var cls = el.className || '';
            if (cls.indexOf('left-1/2') === -1 && cls.indexOf('translate-x') === -1) continue;
            if (el.querySelector('#tg-new-logo')) { logoBadgeDone = true; return; }
            var img = document.createElement('img');
            img.id = 'tg-new-logo';
            img.src = '/assets/topgift-splash-logo-nobg.png';
            img.alt = 'TopGift';
            logoDone = true;
            el.innerHTML = '';
            el.appendChild(img);
            el.style.filter = 'none';
            logoBadgeDone = true;
            break;
          }
        }

        function patchLogoText() {
          if (logoDone) return;
          var all = document.querySelectorAll('*');
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if (
              el.childNodes.length === 1 &&
              el.childNodes[0].nodeType === 3 &&
              el.textContent.trim() === 'TopGift' &&
              !el.id
            ) {
              el.id = 'tg-logo-text';
              logoDone = true;
              break;
            }
          }
        }

        function findPlusBtn() {
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var t;
          while ((t = walker.nextNode())) {
            if (t.textContent.trim() !== '+') continue;
            var node = t.parentElement;
            for (var i = 0; i < 6; i++) {
              if (!node) break;
              var w = node.offsetWidth, h = node.offsetHeight;
              if (w > 10 && w < 50 && h > 10 && h < 50 && Math.abs(w - h) < 12) return node;
              node = node.parentElement;
            }
          }
          return null;
        }

        var _onlineInterval = null;

        function patchPlus() {
          if (plusDone) return;
          if (document.querySelector('.tg-online-counter')) { plusDone = true; return; }
          var btn = findPlusBtn();
          if (!btn || btn.dataset.tgPlusPatched) return;
          btn.dataset.tgPlusPatched = '1';
          btn.style.cssText += ';background:rgba(255,255,255,0.12)!important;border:1.5px solid rgba(255,255,255,0.28)!important;color:#fff!important;width:24px!important;height:24px!important;min-width:24px!important;min-height:24px!important;border-radius:50%!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;font-size:14px!important;box-shadow:none!important;padding:0!important;';
          var counter = document.createElement('span');
          counter.className = 'tg-online-counter';
          fetchOnline(function (n) {
            counter.textContent = fmtOnline(n);
            if (_onlineInterval) clearInterval(_onlineInterval);
            _onlineInterval = setInterval(function () {
              fetchOnline(function (n2) { counter.textContent = fmtOnline(n2); });
            }, 10000);
          });
          if (btn.parentNode) btn.parentNode.insertBefore(counter, btn.nextSibling);
          plusDone = true;
        }

        function runAll() {
          patchLogoText();
          patchLogoImage();
          patchPlus();
        }

        var obs = new MutationObserver(function () {
          runAll();
          if (plusDone && logoDone && logoBadgeDone) obs.disconnect();
        });

        document.addEventListener('DOMContentLoaded', function () {
          obs.observe(document.body, { childList: true, subtree: true });
          setTimeout(runAll, 400);
          setTimeout(runAll, 1200);
          setTimeout(runAll, 2500);
        });
      })();
    </script>

    <!-- Splash screen -->
    <style>
      #tg-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #07070f;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.55s ease;
        pointer-events: all;
      }
      #tg-splash.tg-splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #tg-splash img {
        width: 220px;
        max-width: 70vw;
        object-fit: contain;
        animation: tg-splash-in 0.5s ease both;
      }
      @keyframes tg-splash-in {
        from { opacity: 0; transform: scale(0.88); }
        to   { opacity: 1; transform: scale(1); }
      }
    </style>

  <body>
    <div id="tg-splash">
      <img src="/assets/topgift-splash-logo-nobg.png" alt="TopGift" />
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById('tg-splash');
        setTimeout(function () {
          splash.classList.add('tg-splash-hide');
          setTimeout(function () { splash.remove(); }, 600);
        }, 1400);
      })();
    </script>
