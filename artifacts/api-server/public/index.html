    <!-- Логотип и онлайн-счётчик -->
    <script>
      (function () {
        var _cachedCount = 1247;
        var _onlineInterval = null;

        function fmtOnline(n) {
          return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(n);
        }

        function fetchOnline(cb) {
          fetch('/api/stats/online')
            .then(function (r) { return r.json(); })
            .then(function (d) {
              if (d && typeof d.count === 'number') { _cachedCount = d.count; }
              cb(_cachedCount);
            })
            .catch(function () { cb(_cachedCount); });
        }

        var plusDone = false;
        var logoDone = false;
        var logoBadgeDone = false;

        function patchLogoImage() {
          if (logoBadgeDone) return;
          var candidates = document.querySelectorAll('div.absolute.select-none');
          for (var i = 0; i < candidates.length; i++) {
            var el = candidates[i];
            var cls = el.className || '';
            if (cls.indexOf('left-1/2') === -1 && cls.indexOf('translate-x') === -1) continue;
            if (el.querySelector('#tg-new-logo')) { logoBadgeDone = true; return; }
            var img = document.createElement('img');
            img.id = 'tg-new-logo';
            img.src = '/assets/topgift-splash-logo-nobg.png';
            img.alt = 'TopGift';
            logoDone = true;
            el.innerHTML = '';
            el.appendChild(img);
            el.style.filter = 'none';
            logoBadgeDone = true;
            break;
          }
        }

        function patchLogoText() {
          if (logoDone) return;
          var all = document.querySelectorAll('*');
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if (
              el.childNodes.length === 1 &&
              el.childNodes[0].nodeType === 3 &&
              el.textContent.trim() === 'TopGift' &&
              !el.id
            ) {
              el.id = 'tg-logo-text';
              logoDone = true;
              break;
            }
          }
        }

        function findPlusBtn() {
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var t;
          while ((t = walker.nextNode())) {
            if (t.textContent.trim() !== '+') continue;
            var node = t.parentElement;
            for (var i = 0; i < 6; i++) {
              if (!node) break;
              var w = node.offsetWidth, h = node.offsetHeight;
              if (w > 10 && w < 50 && h > 10 && h < 50 && Math.abs(w - h) < 12) return node;
              node = node.parentElement;
            }
          }
          return null;
        }

        function patchPlus() {
          if (plusDone) return;
          if (document.querySelector('.tg-online-counter')) { plusDone = true; return; }
          var btn = findPlusBtn();
          if (!btn || btn.dataset.tgPlusPatched) return;
          btn.dataset.tgPlusPatched = '1';
          btn.style.cssText += ';background:rgba(255,255,255,0.12)!important;border:1.5px solid rgba(255,255,255,0.28)!important;color:#fff!important;width:24px!important;height:24px!important;min-width:24px!important;min-height:24px!important;border-radius:50%!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;font-size:14px!important;box-shadow:none!important;padding:0!important;';
          var counter = document.createElement('span');
          counter.className = 'tg-online-counter';
          fetchOnline(function (n) {
            counter.textContent = fmtOnline(n);
            if (_onlineInterval) clearInterval(_onlineInterval);
            _onlineInterval = setInterval(function () {
              fetchOnline(function (n2) { counter.textContent = fmtOnline(n2); });
            }, 10000);
          });
          if (btn.parentNode) btn.parentNode.insertBefore(counter, btn.nextSibling);
          plusDone = true;
        }

        function runAll() {
          patchLogoText();
          patchLogoImage();
          patchPlus();
        }

        var obs = new MutationObserver(function () {
          runAll();
          if (plusDone && logoDone && logoBadgeDone) obs.disconnect();
        });

        document.addEventListener('DOMContentLoaded', function () {
          obs.observe(document.body, { childList: true, subtree: true });
          setTimeout(runAll, 400);
          setTimeout(runAll, 1200);
          setTimeout(runAll, 2500);
        });
      })();
    </script>

    <script>
      (function () {
        var splash = document.getElementById('tg-splash');

        function tryClickGames() {
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var t;
          while ((t = walker.nextNode())) {
            var text = t.textContent.trim();
            if (text === 'Игры' || text === 'Games') {
              var node = t.parentElement;
              for (var i = 0; i < 6; i++) {
                if (!node || node === document.body) break;
                var tag = node.tagName;
                var role = node.getAttribute ? node.getAttribute('role') : null;
                if (tag === 'BUTTON' || tag === 'A' || role === 'button' || role === 'tab') {
                  node.click();
                  return true;
                }
                if (node.offsetHeight > 30 && node.offsetHeight < 90) {
                  node.click();
                  return true;
                }
                node = node.parentElement;
              }
            }
          }
          return false;
        }

        setTimeout(function () {
          splash.classList.add('tg-splash-hide');
          setTimeout(function () {
            splash.remove();
            if (!tryClickGames()) {
              setTimeout(tryClickGames, 200);
              setTimeout(tryClickGames, 500);
              setTimeout(tryClickGames, 900);
            }
          }, 600);
        }, 1400);
      })();
    </script>

    <style>
      /* Затемнение сверху (баннеры остаются видны, перекрываем только контент под ними) */
      #tgp-overlay {
        position: fixed;
        /* Начинаем от верха — JS подберёт точку после баннера */
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 9500;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.22s ease;
      }
      #tgp-overlay.tgp-open {
        opacity: 1;
        pointer-events: all;
      }

      /* Чёрная панель — полная ширина, от точки ниже баннеров до низа экрана */
      #tgp-panel {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        /* top выставляется динамически через JS (ниже баннера) */
        top: var(--tgp-top, 38%);
        background: #0a0a12;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 0;
        /* плавное появление — выезжает снизу */
        transform: translateY(calc(100% - var(--tgp-top, 38%)));
        transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      }
      #tgp-overlay.tgp-open #tgp-panel {
        transform: translateY(0);
      }

      /* Список карточек */

    <script>
      (function () {
        var ov  = document.getElementById('tgp-overlay');
        var pan = document.getElementById('tgp-panel');

        // Вычисляем точку начала панели (нижний край баннерной зоны)
        function calcTop() {
          // Ищем баннерный слайдер / первый крупный изображение-контейнер
          var banner = document.querySelector(
            '[class*="banner" i], [class*="slider" i], [class*="carousel" i], [class*="swiper" i]'
          );
          if (banner) {
            var rect = banner.getBoundingClientRect();
            var t = Math.round(rect.bottom);
            if (t > 60 && t < window.innerHeight * 0.75) {
              ov.style.setProperty('--tgp-top', t + 'px');
              return;
            }
          }
          // Запасной вариант: 36% высоты экрана
          ov.style.setProperty('--tgp-top', Math.round(window.innerHeight * 0.36) + 'px');
        }

        function openP() {
          calcTop();
          ov.classList.add('tgp-open');
          ov.setAttribute('aria-hidden', 'false');
          document.body.style.overflow = 'hidden';
        }
        function closeP() {
          ov.classList.remove('tgp-open');
          ov.setAttribute('aria-hidden', 'true');
          document.body.style.overflow = '';
        }

        // Закрытие: клик вне панели (в области баннеров выше)
        ov.addEventListener('click', function (e) {
          if (!pan.contains(e.target)) closeP();
        });

        // Клик по карточке
        pan.addEventListener('click', function (e) {
          var card = e.target.closest('.tgp-card');
          if (!card) return;
          console.log('[TopGift] Игра:', card.dataset.game);
          closeP();
        });

        // Дрейф счётчиков
        setInterval(function () {
          document.querySelectorAll('.tgp-cnt').forEach(function (el) {
            var v = parseInt(el.textContent) || parseInt(el.dataset.base) || 10;
            el.textContent = Math.max(1, v + Math.floor(Math.random() * 7) - 3);
          });
        }, 4000);

        // Перехват клика по «Игры» в React-навигации
        document.addEventListener('click', function (e) {
          var n = e.target;
          for (var i = 0; i < 8; i++) {
            if (!n || n === document.body) break;
            var t = (n.textContent || '').trim();
            if (t === 'Игры' || t === 'Games') {
              setTimeout(openP, 80);
              break;
            }
            n = n.parentElement;
          }
        }, true);
      })();
    </script>
